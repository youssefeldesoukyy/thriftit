<div class="container thriftit-page-section mt-5 pt-5 pb-5">
  <header class="thriftit-bag-header">
    <div class="thriftit-bag-header__icon" aria-hidden="true">
      <i class="fa-solid fa-cart-shopping"></i>
    </div>
    <h1 class="thriftit-page-heading">Your Cart</h1>
    <p class="thriftit-bag-subtitle">Review your picks before checkout</p>
  </header>

  <div class="thriftit-bag-layout" id="cart-layout">
    <div class="thriftit-bag-panel">
      <div class="thriftit-bag-list" id="cart-list" role="list" aria-live="polite"></div>
    </div>

    <aside class="thriftit-bag-panel thriftit-bag-summary" id="cart-summary">
      <h2 class="thriftit-bag-summary__title">Order summary</h2>
      <div class="thriftit-bag-summary__row">
        <span>Items</span>
        <span id="cart-count">0</span>
      </div>
      <div class="thriftit-bag-summary__row thriftit-bag-summary__row--total">
        <span>Subtotal</span>
        <strong><span id="grand-total">0</span> EGP</strong>
      </div>
      <p class="thriftit-bag-summary__note">Shipping is calculated at checkout (Cairo &amp; Giza only).</p>
      <button type="button" id="checkout-btn" class="thriftit-bag-btn thriftit-bag-btn--primary thriftit-bag-btn--block">
        Proceed to checkout
      </button>
      <p class="thriftit-bag-summary__links">
        <a href="shopall.html">Continue shopping</a>
      </p>
    </aside>
  </div>
</div>




























<script>
if (!isLoggedIn()) {
  window.location.href = "login.html";
}

function renderBagItem(item, actionsHtml) {
  var price = parseFloat(item.price) || 0;
  var pid = encodeURIComponent(item.id || "");
  var img = escapeAttr(item.image || BAG_IMG_PLACEHOLDER);
  var name = escapeHtml(item.name || "Item");
  return (
    '<article class="thriftit-bag-item" role="listitem">' +
    '<a href="product.html?id=' + pid + '" class="thriftit-bag-item__thumb">' +
    '<img src="' + img + '" alt="" loading="lazy" width="96" height="96" onerror="this.onerror=null;this.src=\'' +
    BAG_IMG_PLACEHOLDER +
    "'\">" +
    "</a>" +
    '<div class="thriftit-bag-item__body">' +
    '<h2 class="thriftit-bag-item__title"><a href="product.html?id=' + pid + '">' + name + "</a></h2>" +
    '<ul class="thriftit-bag-item__meta">' +
    "<li><span>Color</span> " + escapeHtml(item.color || "—") + "</li>" +
    "<li><span>Size</span> " + escapeHtml(item.size || "—") + "</li>" +
    "</ul>" +
    '<p class="thriftit-bag-item__price">' + price + " EGP</p>" +
    "</div>" +
    '<div class="thriftit-bag-item__actions">' + actionsHtml + "</div>" +
    "</article>"
  );
}

async function loadCart() {
  var listEl = document.getElementById("cart-list");
  var grandTotal = document.getElementById("grand-total");
  var cartCount = document.getElementById("cart-count");
  var cartSummary = document.getElementById("cart-summary");
  var cartLayout = document.getElementById("cart-layout");
  var checkoutBtn = document.getElementById("checkout-btn");

  listEl.innerHTML =
    '<div class="thriftit-bag-loading"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading your cart…</p></div>';

  var userCart = [];
  try {
    userCart = await getCartItems();
  } catch (err) {
    console.error(err);
    var errMsg =
      err && err.message
        ? String(err.message)
        : "Could not load your cart.";
    if (/401|token|unauthorized|log in/i.test(errMsg)) {
      errMsg = "Session expired — please log in again.";
    }
    listEl.innerHTML =
      '<div class="thriftit-bag-error"><p>' +
      escapeHtml(errMsg) +
      "</p><p class=\"mt-2\"><a href=\"login.html\" class=\"thriftit-bag-btn thriftit-bag-btn--primary\">Log in</a></p></div>";
    grandTotal.innerText = "0";
    cartCount.innerText = "0";
    if (checkoutBtn) checkoutBtn.disabled = true;
    return;
  }

  var total = 0;
  listEl.innerHTML = "";

  if (userCart.length === 0) {
    cartLayout.classList.add("thriftit-bag-layout--single");
    if (cartSummary) cartSummary.style.display = "none";
    listEl.innerHTML =
      '<div class="thriftit-bag-empty">' +
      '<i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>' +
      "<p>Your cart is empty — find something you love in the shop.</p>" +
      '<a href="shopall.html" class="thriftit-bag-btn thriftit-bag-btn--primary">Browse shop</a>' +
      "</div>";
    grandTotal.innerText = "0";
    cartCount.innerText = "0";
    if (checkoutBtn) checkoutBtn.disabled = true;
    return;
  }

  cartLayout.classList.remove("thriftit-bag-layout--single");
  if (cartSummary) cartSummary.style.display = "";
  if (checkoutBtn) checkoutBtn.disabled = false;

  userCart.forEach(function (item) {
    var price = parseFloat(item.price) || 0;
    total += price;
    var safeLine = escapeAttr(item._lineId || "");
    var safePid = escapeAttr(item.id || "");
    var actions =
      '<button type="button" class="thriftit-bag-btn thriftit-bag-btn--danger" data-line-id="' +
      safeLine +
      '" data-product-id="' +
      safePid +
      '"><i class="fa-solid fa-trash-can" aria-hidden="true"></i> Remove</button>';
    listEl.innerHTML += renderBagItem(item, actions);
  });

  listEl.querySelectorAll("[data-product-id].thriftit-bag-btn--danger").forEach(function (btn) {
    btn.addEventListener("click", async function () {
      try {
        await removeCartLine(btn.getAttribute("data-line-id"), btn.getAttribute("data-product-id"));
        await loadCart();
        showToast("Removed from cart");
      } catch (e) {
        showToast((e && e.message) || "Could not remove item");
      }
    });
  });

  grandTotal.innerText = total;
  cartCount.innerText = String(userCart.length);
}

document.getElementById("checkout-btn")?.addEventListener("click", async function () {
  if (!isLoggedIn()) {
    showToast("Please login first");
    window.location.href = "login.html";
    return;
  }

  try {
    const cart = await getCartItems();
    if (cart.length === 0) {
      showToast("Your cart is empty 🛒");
      return;
    }
    window.location.href = "checkout.html";
  } catch (e) {
    showToast((e && e.message) || "Could not verify cart");
  }
});

loadCart();
</script>
