</div>

    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

      <div class="d-flex align-items-center gap-3">
        <form class="navbar-search-form" role="search" onsubmit="goToSearch(event)">

        <a href="login.html" id="loginBtn" class="btn btn-outline-dark btn-sm">Login</a>

<script src="script/bootstrap.min.js"></script>
<script src="index.js"></script>

<div class="container thriftit-page-section mt-5 pt-5 pb-5">
  <header class="thriftit-bag-header">
    <div class="thriftit-bag-header__icon" aria-hidden="true">
      <i class="fa-solid fa-heart"></i>
    </div>
    <h1 class="thriftit-page-heading">Your Wishlist</h1>
    <p class="thriftit-bag-subtitle">Items you saved for later</p>
  </header>

  <div class="thriftit-bag-layout" id="wishlist-layout">
    <div class="thriftit-bag-panel">
      <div class="thriftit-bag-list" id="wishlist-list" role="list" aria-live="polite"></div>
    </div>

    <aside class="thriftit-bag-panel thriftit-bag-summary" id="wishlist-summary">
      <h2 class="thriftit-bag-summary__title">Saved items</h2>
      <div class="thriftit-bag-summary__row">
        <span>Total saved</span>
        <span id="wishlist-count">0</span>
      </div>
      <p class="thriftit-bag-summary__note">Add items to your cart, view a product, or remove ones you no longer want.</p>
      <a href="shopall.html" class="thriftit-bag-btn thriftit-bag-btn--primary thriftit-bag-btn--block">Continue shopping</a>
      <p class="thriftit-bag-summary__links">
        <a href="cart.html">View cart</a>
      </p>
    </aside>
  </div>
</div>

<script>
if (!isLoggedIn()) {
  window.location.href = "login.html";
}

function renderBagItem(item, actionsHtml) {
  var price = parseFloat(item.price) || 0;
  var pid = encodeURIComponent(item.id || "");
  var img = escapeAttr(item.image || "");
  var name = escapeHtml(item.name || "Item");
  return (
    '<article class="thriftit-bag-item" role="listitem">' +
    '<a href="product.html?id=' + pid + '" class="thriftit-bag-item__thumb">' +
    '<img src="' + img + '" alt="" loading="lazy" width="96" height="96">' +
    "</a>" +
    '<div class="thriftit-bag-item__body">' +
    '<h2 class="thriftit-bag-item__title"><a href="product.html?id=' + pid + '">' + name + "</a></h2>" +
    '<ul class="thriftit-bag-item__meta">' +
    "<li><span>Color</span> " + escapeHtml(item.color || "—") + "</li>" +
    "<li><span>Size</span> " + escapeHtml(item.size || "—") + "</li>" +
    "</ul>" +
    '<p class="thriftit-bag-item__price">' + price + " EGP</p>" +
    "</div>" +
    '<div class="thriftit-bag-item__actions">' + actionsHtml + "</div>" +
    "</article>"
  );
}

async function loadWishlist() {
  var listEl = document.getElementById("wishlist-list");
  var wishlistCount = document.getElementById("wishlist-count");
  var wishlistSummary = document.getElementById("wishlist-summary");
  var wishlistLayout = document.getElementById("wishlist-layout");

  listEl.innerHTML =
    '<div class="thriftit-bag-loading"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading your wishlist…</p></div>';

  var rows = [];
  try {
    rows = await getWishlistItems();
  } catch (err) {
    console.error(err);
    listEl.innerHTML =
      '<div class="thriftit-bag-error"><p>Could not load your wishlist. Log in and ensure the API is running.</p></div>';
    wishlistCount.innerText = "0";
    return;
  }

  listEl.innerHTML = "";

  if (rows.length === 0) {
    wishlistLayout.classList.add("thriftit-bag-layout--single");
    if (wishlistSummary) wishlistSummary.style.display = "none";
    listEl.innerHTML =
      '<div class="thriftit-bag-empty">' +
      '<i class="fa-solid fa-heart" aria-hidden="true"></i>' +
      "<p>Your wishlist is empty — tap the heart on any product to save it here.</p>" +
      '<a href="shopall.html" class="thriftit-bag-btn thriftit-bag-btn--primary">Browse shop</a>' +
      "</div>";
    wishlistCount.innerText = "0";
    return;
  }

  wishlistLayout.classList.remove("thriftit-bag-layout--single");
  if (wishlistSummary) wishlistSummary.style.display = "";
  wishlistCount.innerText = String(rows.length);

  rows.forEach(function (item) {
    var safeLine = escapeAttr(item._lineId || "");
    var safePid = escapeAttr(item.id || "");
    var pidEnc = encodeURIComponent(item.id || "");
    var actions =
      '<button type="button" class="thriftit-bag-btn thriftit-bag-btn--primary add-wishlist-cart" data-line-id="' +
      safeLine +
      '" data-product-id="' +
      safePid +
      '"><i class="fa-solid fa-cart-shopping" aria-hidden="true"></i> Add to cart</button>' +
      '<a class="thriftit-bag-btn thriftit-bag-btn--ghost" href="product.html?id=' +
      pidEnc +
      '"><i class="fa-solid fa-eye" aria-hidden="true"></i> View</a>' +
      '<button type="button" class="thriftit-bag-btn thriftit-bag-btn--danger" data-line-id="' +
      safeLine +
      '" data-product-id="' +
      safePid +
      '"><i class="fa-solid fa-trash-can" aria-hidden="true"></i> Remove</button>';
    listEl.innerHTML += renderBagItem(item, actions);
  });

  listEl.querySelectorAll(".add-wishlist-cart").forEach(function (btn) {
    btn.addEventListener("click", async function () {
      var pid = btn.getAttribute("data-product-id");
      var lineId = btn.getAttribute("data-line-id");
      if (!pid) return;
      btn.disabled = true;
      try {
        await addProductToCart({ id: pid }).catch(function (addErr) {
          if (!/already in cart/i.test((addErr && addErr.message) || "")) throw addErr;
        });
        await removeWishlistLine(lineId, pid);
        await loadWishlist();
        showToast("Added to cart");
      } catch (e) {
        showToast((e && e.message) || "Could not add to cart");
        btn.disabled = false;
      }
    });
  });

  listEl.querySelectorAll("[data-product-id].thriftit-bag-btn--danger").forEach(function (btn) {
    btn.addEventListener("click", async function () {
      try {
        await removeWishlistLine(
          btn.getAttribute("data-line-id"),
          btn.getAttribute("data-product-id")
        );
        await loadWishlist();
        showToast("Removed from wishlist");
      } catch (e) {
        showToast((e && e.message) || "Could not remove item");
      }
    });
  });
}

loadWishlist();
</script>
  <script src="footer.js"></script>
</body>
</html>
