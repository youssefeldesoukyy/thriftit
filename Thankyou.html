<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmation</title>

<link rel="stylesheet" href="style/bootstrap.min.css">

<style>
body{
  background: #0a0a0a;
  color: white;
  min-height: 100vh;
  font-family: Arial, sans-serif;
}

.container{
  max-width: 900px;
}

.thank-you{
  font-size: 60px;
  font-weight: 800;
  letter-spacing: 4px;
  text-align: center;
  margin-top: 50px;
  color: white;
}

.sub-text{
  text-align: center;
  font-size: 18px;
  color: #cccccc;
  margin-bottom: 40px;
}

.box{
  background: #111;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 25px;
  margin-bottom: 20px;
}

.title{
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #ffffff;
}

.item{
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #222;
}

.highlight{
  color: #ffffff;
  font-weight: bold;
}

.btn-home{
  display: block;
  width: 200px;
  margin: 30px auto;
  text-align: center;
  padding: 10px;
  background: white;
  color: black;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

.btn-home:hover{
  background: #ddd;
}
</style>
<script src="config.js"></script>
</head>

<body>

<div class="container">

  <!-- THANK YOU -->
  <div class="thank-you">THANK YOU</div>
  <div class="sub-text">Your order has been placed successfully</div>

  <!-- ORDER ITEMS -->
  <div class="box">
    <div class="title">Order Items</div>
    <div id="order-items"></div>
  </div>

  <!-- DETAILS -->
  <div class="box">
    <div class="title">Order Details</div>

    <p><strong>Total:</strong> <span id="order-total"></span></p>
    <p><strong>City:</strong> <span id="order-city"></span></p>
    <p><strong>Phone:</strong> <span id="order-phone"></span></p>
    <p><strong>Payment:</strong> <span id="order-payment"></span></p>
    <p><strong>Date:</strong> <span id="order-date"></span></p>
  </div>

  <a href="index.html" class="btn-home">Back to Home</a>

</div>

<script>
let order = JSON.parse(localStorage.getItem("lastOrder"));

if (!order) {
  window.location.href = "index.html";
}

document.getElementById("order-total").innerText = order.total;
document.getElementById("order-city").innerText = order.city;
document.getElementById("order-phone").innerText = order.phone;
document.getElementById("order-payment").innerText = order.payment;
document.getElementById("order-date").innerText = order.date;

let itemsList = document.getElementById("order-items");

order.items.forEach(item => {
  itemsList.innerHTML += `
    <div class="item">
      <span>${item.name}</span>
      <span class="highlight">${item.price} EGP</span>
    </div>
  `;
});
</script>

</body>
</html>
