<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category — Thrift It</title>
  <link rel="stylesheet" href="style/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="auth-api.js?v=6"></script>
  <script src="products-api.js?v=8"></script>
</head>
<body class="thriftit-shop-page">
  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center py-2" href="index.html">
        <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="women.html">Women</a></li>
          <li class="nav-item"><a class="nav-link" href="men.html">Men</a></li>
          <li class="nav-item"><a class="nav-link navbar-sell-nav" href="seller.html">Sell your item</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container shop-page thriftit-page-section mt-5 pt-5 pb-5">
    <h1 id="categoryTitle" class="thriftit-page-heading">Category</h1>
    <div class="row g-4" id="productsContainer"></div>
  </div>

  <script src="script/bootstrap.min.js"></script>
  <script>
    (function () {
      var type = (new URLSearchParams(window.location.search).get("type") || "").trim();
      var label = formatCategoryDisplayName(type) || "Category";
      document.getElementById("categoryTitle").innerText = label;
      renderShopProductGrid("productsContainer", {
        categoryType: type,
        carouselPrefix: "cat",
        emptyMessage: "No " + label + " listings yet",
        emptyHint:
          'Try <a href="shopall.html" class="text-white">Shop All</a> or list one from <a href="seller.html" class="text-white">Sell your item</a>.',
      });
    })();
  </script>
  <script src="footer.js"></script>
</body>
</html>
