<!-- FORM -->
<div class="container mt-5 pt-5">

<h2 class="mb-4">Sell Your Item</h2>

<form id="sellerForm">

<!-- PRODUCT NAME -->
<input class="form-control mb-2" id="productName" placeholder="Product Name" required>

<!-- BRAND -->
<input class="form-control mb-2" id="productBrand" placeholder="Brand" autocomplete="organization" required>

<!-- DESCRIPTION -->
<textarea class="form-control mb-2" id="productDescription" rows="3" placeholder="Description" required></textarea>

<!-- MATERIAL -->
<input class="form-control mb-2" id="productMaterial" placeholder="Material (e.g. Cotton, Leather)" required>

<!-- CATEGORY -->
<select class="form-select mb-2" id="productCategory" required>
  <option value="">Choose Category</option>
  <option value="pants">Pants</option>
  <option value="jackets">Jackets</option>
  <option value="tops">Tops</option>
  <option value="shirts">Shirts</option>
  <option value="dresses">Dresses</option>
  <option value="sweatshirt">Sweatshirt</option>
  <option value="shoes">Shoes</option>
  <option value="bags">Bags</option>
  <option value="skirts">Skirts</option>
</select>

<!-- GENDER: display Woman/Man; values male/female for API -->
<select class="form-select mb-2" id="productGender" required>
  <option value="">Choose Gender</option>
  <option value="female">Woman</option>
  <option value="male">Man</option>
</select>

<!-- CONDITION: labels new/used; values new | used -->
<select class="form-select mb-2" id="productCondition" required>
  <option value="">Choose Condition</option>
  <option value="new">new</option>
  <option value="used">used</option>
</select>

<!-- PRICE -->
<input class="form-control mb-2" id="productPrice" type="number" placeholder="Price" required>

<!-- COLOR -->
<input class="form-control mb-2" id="productColor" placeholder="Color" required>

<!-- SIZE -->
<select class="form-select mb-2" id="productSize" required>
  <option value="">Choose size</option>
</select>

<!-- EMAIL -->
<input class="form-control mb-2" id="sellerEmail" readonly>

<!-- IMAGES (exactly 2, images only) -->
<label class="form-label mb-1 text-white-50 small">Image 1</label>
<input type="file" class="form-control mb-2" id="productImage1" accept="image/*" required>
<label class="form-label mb-1 text-white-50 small">Image 2</label>
<input type="file" class="form-control mb-3" id="productImage2" accept="image/*" required>

<button class="btn btn-dark w-100">Submit</button>

</form>

</div>

<!-- SCRIPT -->
<script>
// Show Bootstrap Toast instead of alert()
function showToast(message) {
  const toastEl = document.getElementById('liveToast');
  const toastMsg = document.getElementById('toast-msg');

  toastMsg.innerText = message;

  const toast = new bootstrap.Toast(toastEl);
  toast.show();
}

// 🔐 LOGIN CHECK
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) {
  showToast("Please login first ❌");
  window.location.href = "login.html";
}

// 📧 AUTO EMAIL
document.getElementById("sellerEmail").value = currentUser.email;


// ================= SIZE LOGIC =================
document.addEventListener("DOMContentLoaded", function () {

  const category = document.getElementById("productCategory");
  const size = document.getElementById("productSize");

  category.addEventListener("change", function () {

    const value = (category.value || "").trim().toLowerCase();

    console.log("selected category:", value);

    size.innerHTML = `<option value="">Choose size</option>`;
    size.disabled = false;

    const clothes = ["pants","jackets","tops","shirts","dresses","sweatshirt","skirts"];

    if (clothes.includes(value)) {
      size.disabled = false;
      ["xs", "s", "m", "l", "xl", "xxl", "xxxl"].forEach(function (k) {
        size.innerHTML += `<option value="${k}">${k}</option>`;
      });
    }

    else if (value === "shoes") {
      size.disabled = false;
      for (let i = 36; i <= 48; i++) {
        size.innerHTML += `<option value="${i}">${i}</option>`;
      }
    }

    else if (value === "bags") {
      size.innerHTML = `<option value="m">one size (m)</option>`;
      size.disabled = true;
    }

    else {
      size.innerHTML = `<option value="">Choose size</option>`;
      size.disabled = true;
    }

  });

});


// ================= SUBMIT (API) =================
document.getElementById("sellerForm").addEventListener("submit", function(e){
e.preventDefault();

var file1 = document.getElementById("productImage1").files[0];
var file2 = document.getElementById("productImage2").files[0];

if (!file1 || !file2) {
  showToast("Please add both images ❌");
  return;
}

function isImageFile(file) {
  return file && typeof file.type === "string" && file.type.indexOf("image/") === 0;
}

if (!isImageFile(file1) || !isImageFile(file2)) {
  showToast("Only image files are allowed ❌");
  return;
}

/** Resize + JPEG encode so JSON body stays under typical server limits (base64 is ~33% larger than raw). */
function compressImageFile(file, maxSide, jpegQuality) {
  return new Promise(function (resolve, reject) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function () {
      URL.revokeObjectURL(url);
      var w = img.naturalWidth;
      var h = img.naturalHeight;
      if (!w || !h) {
        reject(new Error("dims"));
        return;
      }
      var scale = 1;
      if (w > maxSide || h > maxSide) {
        scale = Math.min(maxSide / w, maxSide / h);
      }
      var tw = Math.max(1, Math.round(w * scale));
      var th = Math.max(1, Math.round(h * scale));
      var canvas = document.createElement("canvas");
      canvas.width = tw;
      canvas.height = th;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, tw, th);
      try {
        resolve(canvas.toDataURL("image/jpeg", jpegQuality));
      } catch (err) {
        reject(err);
      }
    };
    img.onerror = function () {
      URL.revokeObjectURL(url);
      reject(new Error("load"));
    };
    img.src = url;
  });
}

/** Step down size/quality until each base64 string fits budget (handles strict Express/nginx limits). */
var COMPRESS_STEPS = [
  [800, 0.70], [720, 0.70], [720, 0.62], [640, 0.62], [640, 0.55],
  [560, 0.55], [560, 0.48], [480, 0.48], [480, 0.42], [420, 0.42],
  [380, 0.38], [340, 0.36], [300, 0.34], [280, 0.32], [260, 0.30]
];

function compressImageUnderBudget(file, maxChars) {
  var i = 0;
  function next() {
    if (i >= COMPRESS_STEPS.length) {
      return compressImageFile(file, 240, 0.28);
    }
    var step = COMPRESS_STEPS[i++];
    return compressImageFile(file, step[0], step[1]).then(function (dataUrl) {
      if (dataUrl.length <= maxChars) return dataUrl;
      return next();
    });
  }
  function hardCap(url) {
    if (url.length <= maxChars) return Promise.resolve(url);
    return compressImageFile(file, 200, 0.24).then(function (u2) {
      if (u2.length <= maxChars) return u2;
      return compressImageFile(file, 160, 0.20);
    });
  }
  return next().then(hardCap);
}

var maxImageChars =
  typeof API_LISTING_MAX_IMAGE_CHARS !== "undefined" &&
  typeof API_LISTING_MAX_IMAGE_CHARS === "number"
    ? API_LISTING_MAX_IMAGE_CHARS
    : 220000;

Promise.all([
  compressImageUnderBudget(file1, maxImageChars),
  compressImageUnderBudget(file2, maxImageChars)
])
  .then(function (images) {
    return (async function submitListing() {
      try {
        var imgs = (images || []).filter(function (u) {
          return (
            typeof u === "string" &&
            u.length > 0 &&
            u.indexOf("data:image") === 0
          );
        });
        if (imgs.length === 0) {
          showToast("Images did not encode — use JPG or PNG and try again ❌");
          return;
        }

        var catSlug = document.getElementById("productCategory").value.trim().toLowerCase();
        var genderVal = document.getElementById("productGender").value.trim();

        var SUB_LABEL = {
          pants: "Pants",
          jackets: "Jackets",
          tops: "Tops",
          shirts: "Shirts",
          dresses: "Dresses",
          sweatshirt: "Sweatshirt",
          shoes: "Shoes",
          bags: "Bags",
          skirts: "Skirts"
        };

        /** API: categoryid OR (parentRoot + subcategoryName|productCategory) */
        var parentRoot =
          typeof API_LISTING_PARENT_ROOT === "string" &&
          API_LISTING_PARENT_ROOT.trim()
            ? API_LISTING_PARENT_ROOT.trim()
            : genderVal === "female"
              ? "Women"
              : "Men";
        var subName = SUB_LABEL[catSlug] || catSlug;

        var sizeRaw = document.getElementById("productSize").value.trim();
        var sizeOut = sizeRaw;
        if (/^\d+$/.test(sizeRaw)) {
          sizeOut = String(parseInt(sizeRaw, 10));
        } else {
          sizeOut = sizeRaw.toLowerCase().replace(/\s+/g, "");
        }

        function dataURLToBlob(dataURL) {
          var parts = String(dataURL).split(",");
          var mime =
            (parts[0].match(/:(.*?);/) || [])[1] || "image/jpeg";
          var bin = atob(parts[1]);
          var len = bin.length;
          var arr = new Uint8Array(len);
          while (len--) arr[len] = bin.charCodeAt(len);
          return new Blob([arr], { type: mime });
        }

        var payload = {
          name: document.getElementById("productName").value.trim(),
          brand: document.getElementById("productBrand").value.trim(),
          description: document.getElementById("productDescription").value.trim(),
          material: document.getElementById("productMaterial").value.trim(),
          parentRoot: parentRoot,
          subcategoryName: subName,
          productCategory: catSlug,
          category: catSlug,
          gender: genderVal,
          condition: document.getElementById("productCondition").value.trim(),
          price: document.getElementById("productPrice").value,
          color: document.getElementById("productColor").value.trim(),
          size: sizeOut,
          sellerEmail: currentUser.email,
          email: currentUser.email,
          status: "pending"
        };

        if (
          typeof API_CATEGORY_IDS !== "undefined" &&
          API_CATEGORY_IDS &&
          typeof API_CATEGORY_IDS === "object" &&
          API_CATEGORY_IDS[catSlug]
        ) {
          var cid = String(API_CATEGORY_IDS[catSlug]);
          payload.categoryid = cid;
          payload.categoryId = cid;
        }

        var useMultipart =
          typeof API_PRODUCTS_USE_MULTIPART === "undefined" ||
          API_PRODUCTS_USE_MULTIPART;

        if (useMultipart && imgs.length > 0) {
          var blobs = imgs.map(function (u) {
            return dataURLToBlob(u);
          });
          await createProductListing(payload, blobs);
        } else {
          payload.images = imgs;
          payload.image = imgs[0];
          await createProductListing(payload);
        }
        showToast("Product submitted successfully 🎉");
        document.getElementById("sellerForm").reset();
        document.getElementById("sellerEmail").value = currentUser.email;
      } catch (err) {
        console.error(err);
        showToast((err && err.message) || "Submit failed — check API route / fields");
      }
    })();
  })
  .catch(function () {
    showToast("Could not process an image — use JPG or PNG, or try a smaller photo ❌");
  });

});

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
