<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell Your Item — Thrift It</title>
  <link rel="stylesheet" href="style/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="config.js?v=4002"></script>
  <script src="auth-api.js?v=3"></script>
  <script src="app-api.js?v=4"></script>
</head>
<body class="thriftit-seller-page">

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center py-2" href="index.html">
        <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="women.html">Women</a></li>
          <li class="nav-item"><a class="nav-link" href="men.html">Men</a></li>
          <li class="nav-item">
            <a class="nav-link navbar-sell-nav active" href="seller.html" aria-current="page">Sell your item</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <form class="navbar-search-form" role="search" onsubmit="goToSearch(event)">
            <input class="navbar-search-input" type="search" placeholder="Search" id="searchInput" autocomplete="off">
            <button type="submit" class="navbar-search-btn" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </form>
          <a href="wishlist.html" class="wishlist-link" aria-label="Wishlist" title="Wishlist">
            <i class="fa-solid fa-heart"></i>
          </a>
          <a href="cart.html" class="cart-link">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
          <a href="login.html" id="loginBtn" class="btn btn-outline-dark btn-sm">Login</a>
          <a href="signup.html" id="signupBtn" class="btn btn-outline-dark btn-sm">Sign Up</a>
          <a href="profile.html" id="username" class="sign-link text-decoration-none align-middle" style="display:none;"></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="seller-main">
    <div class="seller-card">
      <h1 class="seller-card__heading">Sell Your Item</h1>
      <p class="seller-card__sub">List a piece for others to discover. Your listing goes live after review.</p>

      <form id="sellerForm" novalidate>
        <p class="seller-section-title">Photo</p>
        <div class="seller-photo-field">
          <label class="seller-photo-zone" for="productImage" id="photoZone">
            <input type="file" id="productImage" accept="image/*" multiple required>
            <span class="seller-photo-zone__icon" aria-hidden="true"><i class="fa-solid fa-cloud-arrow-up"></i></span>
            <span class="seller-photo-zone__title">Choose your files</span>
            <span class="seller-photo-zone__hint">At least 2 JPG or PNG photos</span>
          </label>
          <div id="photoPreview" class="seller-photo-preview d-none" aria-live="polite"></div>
        </div>

        <p class="seller-section-title">Product details</p>
        <div class="row g-0">
          <div class="col-md-6 pe-md-2">
            <div class="seller-field">
              <label for="productName">Product name</label>
              <input class="form-control" id="productName" placeholder="e.g. Vintage denim jacket" required>
            </div>
          </div>
          <div class="col-md-6 ps-md-2">
            <div class="seller-field">
              <label for="productBrand">Brand</label>
              <input class="form-control" id="productBrand" placeholder="Brand name" autocomplete="organization" required>
            </div>
          </div>
        </div>
        <div class="seller-field">
          <label for="productDescription">Description</label>
          <textarea class="form-control" id="productDescription" rows="3" placeholder="Condition notes, fit, flaws…" required></textarea>
        </div>
        <div class="seller-field">
          <label for="productMaterial">Material</label>
          <input class="form-control" id="productMaterial" placeholder="e.g. Cotton, leather" required>
        </div>

        <p class="seller-section-title mt-2">Category &amp; fit</p>
        <div class="row g-0">
          <div class="col-md-6 pe-md-2">
            <div class="seller-field">
              <label for="productCategory">Category</label>
              <select class="form-select" id="productCategory" required
                onchange="typeof updateSellerSizeOptions==='function'&&updateSellerSizeOptions()">
                <option value="">Choose category</option>
                <option value="jackets">Jackets</option>
                <option value="shirts">Shirts</option>
                <option value="tshirts">Tshirts</option>
                <option value="sweatshirts">Sweatshirts</option>
                <option value="bottoms">Bottoms</option>
                <option value="dresses">Dresses</option>
                <option value="tops">Tops</option>
                <option value="accessories">Accessories</option>
                <option value="shoes">Shoes</option>
              </select>
            </div>
          </div>
          <div class="col-md-6 ps-md-2">
            <div class="seller-field">
              <label for="productGender">Gender</label>
              <select class="form-select" id="productGender" required>
                <option value="">Choose gender</option>
                <option value="female">Women</option>
                <option value="male">Men</option>
              </select>
            </div>
          </div>
        </div>
        <div class="row g-0">
          <div class="col-md-6 pe-md-2">
            <div class="seller-field">
              <label for="productCondition">Condition</label>
              <select class="form-select" id="productCondition" required>
                <option value="">Choose condition</option>
                <option value="new">New</option>
                <option value="used">Used</option>
              </select>
            </div>
          </div>
          <div class="col-md-6 ps-md-2">
            <div class="seller-field">
              <label for="productSize">Size</label>
              <select class="form-select" id="productSize" required>
                <option value="">Choose size</option>
              </select>
            </div>
          </div>
        </div>

        <p class="seller-section-title mt-2">Price &amp; color</p>
        <div class="row g-0">
          <div class="col-md-6 pe-md-2">
            <div class="seller-field seller-price-field">
              <label for="productPrice">Price (EGP)</label>
              <div class="seller-price-row">
                <input class="form-control" id="productPrice" type="number" min="0" step="1" placeholder="0" required>
                <button type="button" class="btn seller-ai-price-btn" id="aiSuggestPriceBtn" title="Suggest price from brand, name, material and condition">
                  <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
                  <span>AI price</span>
                </button>
              </div>
              <div id="aiPriceSuggestion" class="seller-ai-suggestion d-none" aria-live="polite"></div>
            </div>
          </div>
          <div class="col-md-6 ps-md-2">
            <div class="seller-field">
              <label for="productColor">Color</label>
              <input class="form-control" id="productColor" placeholder="e.g. Navy, beige" required>
            </div>
          </div>
        </div>

        <button type="submit" class="btn seller-submit">Submit listing</button>
      </form>
    </div>
  </main>

  <script src="seller-sizes.js?v=1"></script>
  <script src="script/bootstrap.min.js"></script>
  <script src="index.js"></script>
  <script>
    var lastAiSuggestion = null;

    function renderAiSuggestion(s) {
      var box = document.getElementById("aiPriceSuggestion");
      if (!s || !box) return;
      var cur = s.currency || "EGP";
      var mid =
        s.suggestedPrice != null && !Number.isNaN(Number(s.suggestedPrice))
          ? Math.round(Number(s.suggestedPrice))
          : Math.round((Number(s.minPrice) + Number(s.maxPrice)) / 2);
      box.classList.remove("d-none");
      box.innerHTML =
        '<p class="seller-ai-suggestion__range mb-1">' +
        "<strong>" +
        escapeHtml(String(Math.round(s.minPrice))) +
        " – " +
        escapeHtml(String(Math.round(s.maxPrice))) +
        " " +
        escapeHtml(cur) +
        "</strong>" +
        (mid ? " · suggested <strong>" + escapeHtml(String(mid)) + " " + escapeHtml(cur) + "</strong>" : "") +
        "</p>" +
        (s.reason
          ? '<p class="seller-ai-suggestion__reason mb-2">' + escapeHtml(s.reason) + "</p>"
          : "") +
        '<button type="button" class="btn btn-sm seller-ai-apply-btn" id="aiApplyPriceBtn">Use suggested price (' +
        escapeHtml(String(mid)) +
        " " +
        escapeHtml(cur) +
        ")</button>";
      document.getElementById("aiApplyPriceBtn").addEventListener("click", function () {
        document.getElementById("productPrice").value = String(mid);
        showToast("Price set to " + mid + " " + cur);
      });
    }

    document.getElementById("aiSuggestPriceBtn").addEventListener("click", async function () {
      var btn = document.getElementById("aiSuggestPriceBtn");
      var brand = document.getElementById("productBrand").value.trim();
      var productName = document.getElementById("productName").value.trim();
      var material = document.getElementById("productMaterial").value.trim();
      var condition = document.getElementById("productCondition").value.trim();

      if (!brand || !productName || !material || !condition) {
        showToast("Fill in brand, product name, material, and condition first");
        return;
      }

      if (!isLoggedIn()) {
        showToast("Log in again to use AI pricing");
        return;
      }

      var label = btn.querySelector("span");
      var prevText = label ? label.textContent : "AI price";
      btn.disabled = true;
      if (label) label.textContent = "Thinking…";

      try {
        lastAiSuggestion = await suggestListingPrice({
          brand: brand,
          productName: productName,
          material: material,
          condition: condition,
          currency: "EGP",
        });
        renderAiSuggestion(lastAiSuggestion);
        showToast("AI price suggestion ready");
      } catch (err) {
        console.error(err);
        var msg = (err && err.message) || "Could not get AI price";
        if (/GROQ_API_KEY|not configured/i.test(msg)) {
          msg = "AI pricing is not set up on the server (GROQ_API_KEY in backend .env).";
        }
        showToast(msg);
      } finally {
        btn.disabled = false;
        if (label) label.textContent = prevText;
      }
    });

    if (location.protocol !== "file:") {
      fetch(String(API_BASE).replace(/\/$/, "") + "/health", { method: "GET" })
        .catch(function () {
          showToast(
            "Cannot reach API at " +
              API_BASE +
              " — start the backend on port 4000, then refresh."
          );
        });
    }

    var SELLER_MIN_PHOTOS = 2;

    (function initPhotoPreview() {
      var input = document.getElementById("productImage");
      var preview = document.getElementById("photoPreview");
      var objectUrls = [];

      function revokePreviewUrls() {
        objectUrls.forEach(function (u) {
          URL.revokeObjectURL(u);
        });
        objectUrls = [];
      }

      input.addEventListener("change", function () {
        revokePreviewUrls();
        preview.innerHTML = "";

        var files = input.files ? Array.prototype.slice.call(input.files) : [];
        if (files.length === 0) {
          preview.classList.add("d-none");
          return;
        }

        var grid = document.createElement("div");
        grid.className = "seller-photo-preview__grid";

        files.forEach(function (file, idx) {
          var url = URL.createObjectURL(file);
          objectUrls.push(url);
          var thumb = document.createElement("div");
          thumb.className = "seller-photo-preview__thumb";
          var img = document.createElement("img");
          img.src = url;
          img.alt = "Photo " + (idx + 1);
          thumb.appendChild(img);
          grid.appendChild(thumb);
        });

        preview.appendChild(grid);

        var status = document.createElement("p");
        status.className = "seller-photo-preview__count mb-0";
        if (files.length < SELLER_MIN_PHOTOS) {
          status.textContent =
            files.length +
            " selected — add at least " +
            SELLER_MIN_PHOTOS +
            " photos";
          status.classList.add("seller-photo-preview__count--warn");
        } else {
          status.textContent = files.length + " photos selected";
        }
        preview.appendChild(status);
        preview.classList.remove("d-none");
      });
    })();

    document.getElementById("sellerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      if (!isLoggedIn()) {
        showToast("Please log in first");
        window.location.href = "login.html";
        return;
      }

      var files = document.getElementById("productImage").files
        ? Array.prototype.slice.call(document.getElementById("productImage").files)
        : [];

      if (files.length < SELLER_MIN_PHOTOS) {
        showToast("Please choose at least " + SELLER_MIN_PHOTOS + " photos");
        return;
      }

      var catForSize = (document.getElementById("productCategory").value || "").trim();
      var sizeForListing = (document.getElementById("productSize").value || "").trim();
      if (!catForSize) {
        showToast("Please choose a category");
        return;
      }
      if (!sizeForListing) {
        showToast("Please choose a size");
        return;
      }

      function isImageFile(f) {
        return f && typeof f.type === "string" && f.type.indexOf("image/") === 0;
      }

      for (var fi = 0; fi < files.length; fi++) {
        if (!isImageFile(files[fi])) {
          showToast("Only image files are allowed");
          return;
        }
      }

      function compressImageFile(f, maxSide, jpegQuality) {
        return new Promise(function (resolve, reject) {
          var url = URL.createObjectURL(f);
          var img = new Image();
          img.onload = function () {
            URL.revokeObjectURL(url);
            var w = img.naturalWidth;
            var h = img.naturalHeight;
            if (!w || !h) {
              reject(new Error("dims"));
              return;
            }
            var scale = 1;
            if (w > maxSide || h > maxSide) {
              scale = Math.min(maxSide / w, maxSide / h);
            }
            var tw = Math.max(1, Math.round(w * scale));
            var th = Math.max(1, Math.round(h * scale));
            var canvas = document.createElement("canvas");
            canvas.width = tw;
            canvas.height = th;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, tw, th);
            try {
              resolve(canvas.toDataURL("image/jpeg", jpegQuality));
            } catch (err) {
              reject(err);
            }
          };
          img.onerror = function () {
            URL.revokeObjectURL(url);
            reject(new Error("load"));
          };
          img.src = url;
        });
      }

      var COMPRESS_STEPS = [
        [800, 0.7], [720, 0.7], [720, 0.62], [640, 0.62], [640, 0.55],
        [560, 0.55], [560, 0.48], [480, 0.48], [480, 0.42], [420, 0.42],
        [380, 0.38], [340, 0.36], [300, 0.34], [280, 0.32], [260, 0.3]
      ];

      function compressImageUnderBudget(f, maxChars) {
        var i = 0;
        function next() {
          if (i >= COMPRESS_STEPS.length) {
            return compressImageFile(f, 240, 0.28);
          }
          var step = COMPRESS_STEPS[i++];
          return compressImageFile(f, step[0], step[1]).then(function (dataUrl) {
            if (dataUrl.length <= maxChars) return dataUrl;
            return next();
          });
        }
        function hardCap(url) {
          if (url.length <= maxChars) return Promise.resolve(url);
          return compressImageFile(f, 200, 0.24).then(function (u2) {
            if (u2.length <= maxChars) return u2;
            return compressImageFile(f, 160, 0.2);
          });
        }
        return next().then(hardCap);
      }

      var maxImageChars =
        typeof API_LISTING_MAX_IMAGE_CHARS !== "undefined" &&
        typeof API_LISTING_MAX_IMAGE_CHARS === "number"
          ? API_LISTING_MAX_IMAGE_CHARS
          : 220000;

      Promise.all(
        files.map(function (f) {
          return compressImageUnderBudget(f, maxImageChars);
        })
      )
        .then(function (encoded) {
          return (async function submitListing() {
            try {
              var imgs = (encoded || []).filter(function (u) {
                return (
                  typeof u === "string" &&
                  u.length > 0 &&
                  u.indexOf("data:image") === 0
                );
              });
              if (imgs.length < SELLER_MIN_PHOTOS) {
                showToast("Images did not encode — use JPG or PNG and try again");
                return;
              }

              var catSlug = document.getElementById("productCategory").value.trim().toLowerCase();
              var genderVal = document.getElementById("productGender").value.trim();

              /** UI slug → API subcategory (backend allows pants, not bottoms). */
              var SELLER_TO_API_CATEGORY = { bottoms: "pants" };
              var apiCatSlug = SELLER_TO_API_CATEGORY[catSlug] || catSlug;

              var SUB_LABEL = {
                jackets: "Jackets",
                shirts: "Shirts",
                tshirts: "Tshirts",
                sweatshirts: "Sweatshirts",
                bottoms: "Bottoms",
                dresses: "Dresses",
                tops: "Tops",
                accessories: "Accessories",
                pants: "Bottoms"
              };

              var parentRoot =
                typeof API_LISTING_PARENT_ROOT === "string" &&
                API_LISTING_PARENT_ROOT.trim()
                  ? API_LISTING_PARENT_ROOT.trim()
                  : genderVal === "female"
                    ? "Women"
                    : "Men";
              var subName = SUB_LABEL[apiCatSlug] || SUB_LABEL[catSlug] || catSlug;

              var sizeRaw = document.getElementById("productSize").value.trim();
              var sizeOut = sizeRaw;
              if (/^\d+$/.test(sizeRaw)) {
                sizeOut = String(parseInt(sizeRaw, 10));
              } else {
                sizeOut = sizeRaw.toLowerCase().replace(/\s+/g, "");
              }

              function dataURLToBlob(dataURL) {
                var parts = String(dataURL).split(",");
                var mime = (parts[0].match(/:(.*?);/) || [])[1] || "image/jpeg";
                var bin = atob(parts[1]);
                var len = bin.length;
                var arr = new Uint8Array(len);
                while (len--) arr[len] = bin.charCodeAt(len);
                return new Blob([arr], { type: mime });
              }

              var payload = {
                name: document.getElementById("productName").value.trim(),
                brand: document.getElementById("productBrand").value.trim(),
                description: document.getElementById("productDescription").value.trim(),
                material: document.getElementById("productMaterial").value.trim(),
                parentRoot: parentRoot,
                subcategoryName: apiCatSlug,
                productCategory: apiCatSlug,
                category: apiCatSlug,
                gender:
                  genderVal === "female"
                    ? "Female"
                    : genderVal === "male"
                      ? "Male"
                      : genderVal,
                condition: document.getElementById("productCondition").value.trim(),
                price: document.getElementById("productPrice").value,
                color: document.getElementById("productColor").value.trim(),
                size: sizeOut,
                sellerEmail: currentUser.email,
                email: currentUser.email
              };

              if (
                typeof API_CATEGORY_IDS !== "undefined" &&
                API_CATEGORY_IDS &&
                typeof API_CATEGORY_IDS === "object" &&
                API_CATEGORY_IDS[apiCatSlug]
              ) {
                var cid = String(API_CATEGORY_IDS[apiCatSlug]);
                payload.categoryid = cid;
                payload.categoryId = cid;
              }

              var useMultipart =
                typeof API_PRODUCTS_USE_MULTIPART === "undefined" ||
                API_PRODUCTS_USE_MULTIPART;

              if (useMultipart && imgs.length > 0) {
                var blobs = imgs.map(function (u) {
                  return dataURLToBlob(u);
                });
                await createProductListing(payload, blobs);
              } else {
                payload.images = imgs;
                payload.image = imgs[0];
                await createProductListing(payload);
              }
              showToast("Product submitted successfully");
              setTimeout(function () {
                window.location.href = "shopall.html";
              }, 400);
            } catch (err) {
              console.error(err);
              showToast((err && err.message) || "Submit failed — check API route / fields");
            }
          })();
        })
        .catch(function () {
          showToast("Could not process a photo — use JPG or PNG, or try smaller files");
        });
    });
  </script>
  <script src="footer.js"></script>
</body>
</html>
