<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Thrift It</title>
  <link rel="stylesheet" href="style/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="config.js?v=4000"></script>
  <script src="auth-api.js?v=4"></script>
</head>
<body class="thriftit-auth-page">
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center py-2" href="index.html">
        <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
      </a>
    </div>
  </nav>

  <div class="auth-split">
    <aside class="auth-split__hero" aria-hidden="true">
      <div class="auth-split__hero-inner">
        <h2 class="auth-split__hero-title">Reset your password</h2>
        <div class="auth-split__hero-line"></div>
        <p class="auth-split__benefits" style="list-style:none;padding:0;margin:0;opacity:0.9;">
          Enter your account email and we will send you a link to choose a new password.
        </p>
      </div>
    </aside>

    <section class="auth-split__form-panel">
      <div class="auth-split__form-wrap">
        <h1 class="auth-split__heading">Forgot password</h1>
        <p class="auth-split__sub">We will email you a secure reset link.</p>

        <form id="forgotForm" novalidate>
          <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <button type="submit" class="btn auth-submit" id="submitBtn">Send reset link</button>
          <p class="auth-form-switch mt-3">
            <a href="login.html" class="auth-switch-link">Back to log in</a>
          </p>
        </form>
      </div>
    </section>
  </div>

  <script src="footer.js"></script>
  <script src="script/bootstrap.min.js"></script>
  <script>
    document.getElementById("forgotForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      var email = document.getElementById("email").value.trim().toLowerCase();
      if (!email) {
        showToast("Please enter your email");
        return;
      }
      var btn = document.getElementById("submitBtn");
      btn.disabled = true;
      try {
        var msg = await apiForgotPassword(email);
        showToast(msg);
      } catch (err) {
        showToast((err && err.message) || "Could not send reset email");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
