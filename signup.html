<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    
    <h3 class="text-center mb-4">Sign Up</h3>

    <form id="signupForm">
      
      <div class="mb-3">
        <label class="form-label">First name</label>
        <input type="text" id="firstName" class="form-control" placeholder="First name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Last name</label>
        <input type="text" id="lastName" class="form-control" placeholder="Last name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Create password" required>
      </div>
     <div class="mb-3">
       <label class="form-label">Confirm Password</label>
       <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
    </div>
      <button type="submit" class="btn btn-dark w-100">Sign Up</button>

      <p class="text-center mt-3">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </form>

  </div>
</div>






















<script>
document.getElementById("signupForm").addEventListener("submit", async function(e){
  e.preventDefault();

  let firstName = document.getElementById("firstName").value.trim();
  let lastName = document.getElementById("lastName").value.trim();
  let email = document.getElementById("email").value.trim().toLowerCase();
  let password = document.getElementById("password").value.trim();
  let confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (firstName === "" || lastName === "" || email === "" || password === "" || confirmPassword === "") {
    showToast("Please fill all fields");
    return;
  }

  if (password.length < 6) {
    showToast("Password must be at least 6 characters");
    return;
  }

  if (password !== confirmPassword) {
    showToast("Passwords do not match ❌");
    return;
  }

  try {
    await apiRegister(firstName, lastName, email, password);
    showToast("Account created successfully 🎉");
    setTimeout(function () {
      window.location.href = "index.html";
    }, 350);
  } catch (err) {
    var msg = (err && err.message) || "Sign up failed";
    showToast(msg);
    if (msg.indexOf("Please log in") !== -1) {
      setTimeout(function () {
        window.location.href = "login.html";
      }, 1600);
    }
  }
});
// Show Bootstrap Toast instead of alert()
function showToast(message) {
  const toastEl = document.getElementById('liveToast');
  const toastMsg = document.getElementById('toast-msg');

  toastMsg.innerText = message;

  const toast = new bootstrap.Toast(toastEl);
  toast.show();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
