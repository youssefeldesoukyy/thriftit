<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Thrift It</title>
  <link rel="stylesheet" href="style/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="auth-api.js?v=7"></script>
</head>
<body class="thriftit-auth-page">

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center py-2" href="index.html">
        <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="women.html">Women</a></li>
          <li class="nav-item"><a class="nav-link" href="men.html">Men</a></li>
          <li class="nav-item">
            <a class="nav-link navbar-sell-nav" href="seller.html">Sell your item</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <form class="navbar-search-form" role="search" onsubmit="goToSearch(event)">
            <input class="navbar-search-input" type="search" placeholder="Search" id="searchInput" autocomplete="off">
            <button type="submit" class="navbar-search-btn" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </form>
          <a href="wishlist.html" class="wishlist-link" aria-label="Wishlist" title="Wishlist">
            <i class="fa-solid fa-heart"></i>
          </a>
          <a href="cart.html" class="cart-link">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
          <a href="login.html" id="loginBtn" class="btn btn-outline-dark btn-sm">Login</a>
          <a href="signup.html" id="signupBtn" class="btn btn-outline-dark btn-sm">Sign Up</a>
          <a href="profile.html" id="username" class="sign-link text-decoration-none align-middle" style="display:none;"></a>
        </div>
      </div>
    </div>
  </nav>

  <div class="auth-split">
    <aside class="auth-split__hero" aria-hidden="true">
      <div class="auth-split__hero-inner">
        <h2 class="auth-split__hero-title">Why Thrift It</h2>
        <div class="auth-split__hero-line"></div>
        <ul class="auth-split__benefits">
          <li>
            <span class="auth-split__check"><i class="fa-solid fa-check"></i></span>
            Unique vintage &amp; second-hand finds
          </li>
          <li>
            <span class="auth-split__check"><i class="fa-solid fa-check"></i></span>
            Buy and sell in one place — no hassle
          </li>
          <li>
            <span class="auth-split__check"><i class="fa-solid fa-check"></i></span>
            Give clothes a second life
          </li>
        </ul>
      </div>
    </aside>

    <section class="auth-split__form-panel">
      <div class="auth-split__form-wrap auth-split__form-wrap--wide">
        <h1 class="auth-split__heading">Sign up</h1>
        <p class="auth-split__sub">Join Thrift It to shop unique pieces and sell your own.</p>

        <form id="signupForm">
          <div class="auth-field-row">
            <div class="auth-field">
              <label for="firstName">First name</label>
              <input type="text" id="firstName" placeholder="First name" autocomplete="given-name" required>
            </div>
            <div class="auth-field">
              <label for="lastName">Last name</label>
              <input type="text" id="lastName" placeholder="Last name" autocomplete="family-name" required>
            </div>
          </div>
          <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email" autocomplete="email" required>
          </div>
          <div class="auth-field">
            <label for="phone">Phone</label>
            <input
              type="tel"
              id="phone"
              placeholder="01XXXXXXXXX"
              autocomplete="tel"
              inputmode="numeric"
              maxlength="11"
              required
              oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,11)"
            >
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" autocomplete="new-password" required>
          </div>
          <div class="auth-field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" required>
          </div>
          <button type="submit" class="btn auth-submit">Sign up</button>
          <p class="auth-form-switch">
            Already have an account?
            <a href="login.html" class="auth-switch-link">Log in</a>
          </p>
        </form>
      </div>
    </section>
  </div>
<script src="footer.js"></script>
  <script src="script/bootstrap.min.js"></script>
  <script src="index.js"></script>
  <script>
    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      var firstName = document.getElementById("firstName").value.trim();
      var lastName = document.getElementById("lastName").value.trim();
      var email = document.getElementById("email").value.trim().toLowerCase();
      var phone = document.getElementById("phone").value.trim();
      var password = document.getElementById("password").value.trim();
      var confirmPassword = document.getElementById("confirmPassword").value.trim();
      if (!firstName || !lastName || !email || !phone || !password || !confirmPassword) {
        showToast("Please fill all fields");
        return;
      }
      var phoneDigits = phone.replace(/\D/g, "");
      if (!/^01\d{9}$/.test(phoneDigits)) {
        showToast("Enter a valid Egyptian phone (11 digits, starts with 01)");
        document.getElementById("phone").focus();
        return;
      }
      if (password.length < 6) {
        showToast("Password must be at least 6 characters");
        return;
      }
      if (password !== confirmPassword) {
        showToast("Passwords do not match");
        return;
      }
      try {
        await apiRegister(firstName, lastName, email, password, phoneDigits);
        showToast("Account created");
        setTimeout(function () { window.location.href = "index.html"; }, 350);
      } catch (err) {
        showToast((err && err.message) || "Could not sign up");
      }
    });
  </script>
  </body>
</html>
