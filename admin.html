<!-- Pending Products Section -->
<div class="container mt-5 pt-5">
  <h2 class="mb-2 d-inline-block">Pending Products</h2>
  <button id="deleteApprovedBtn" class="btn btn-dark ms-3 mb-4">Delete All Approved Products</button>

  <div id="pendingProducts" class="row"></div>
</div>

<script>
const pendingContainer = document.getElementById('pendingProducts');

async function loadPendingProducts() {
  pendingContainer.innerHTML = "<p class='text-muted'>Loading…</p>";
  try {
    const products = await fetchProductsMerged();
    const pendingProducts = products.filter(
      (p) => (p.status || "").toLowerCase() === "pending"
    );

    pendingContainer.innerHTML = "";

    if (pendingProducts.length === 0) {
      pendingContainer.innerHTML = "<p class='text-muted'>No pending products.</p>";
      return;
    }

    pendingProducts.forEach((product) => {
      const col = document.createElement("div");
      col.className = "col-md-4 mb-4";
      const safeId = String(product.id).replace(/[^a-zA-Z0-9_-]/g, "");
      col.innerHTML = `
      <div class="card">
        <div id="carousel-${safeId}" class="carousel slide" data-bs-interval="false">
          <div class="carousel-inner">
            ${(product.images || []).map((img, index) => `
              <div class="carousel-item ${index === 0 ? "active" : ""}">
                <img src="${img}" class="d-block w-100" alt="">
              </div>
            `).join("")}
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carousel-${safeId}" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carousel-${safeId}" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
        <div class="card-body">
          <h5>${product.name}</h5>
          ${product.brand ? `<p class="text-muted small mb-1">Brand: ${product.brand}</p>` : ""}
          <p>${product.price} EGP</p>
          <p>Color: ${product.color}</p>
          <p>Size: ${product.size}</p>
          <p>Condition: ${product.condition}</p>
          <p>Seller: ${product.email || product.sellerEmail || "—"}</p>
          <button class="btn btn-success me-2 approve-btn">Approve</button>
          <button class="btn btn-danger reject-btn">Reject</button>
        </div>
      </div>
    `;
      pendingContainer.appendChild(col);

      col.querySelector(".approve-btn").addEventListener("click", () =>
        handleAction(product.id, "approved")
      );
      col.querySelector(".reject-btn").addEventListener("click", () =>
        handleAction(product.id, "rejected")
      );
    });
  } catch (e) {
    console.error(e);
    pendingContainer.innerHTML =
      "<p class='text-danger'>Could not load pending products. Open console.</p>";
  }
}

async function handleAction(productId, action) {
  try {
    if (action === "approved") {
      await updateProductStatus(productId, "approved");
    } else {
      await updateProductStatus(productId, "rejected");
    }
    await loadPendingProducts();
  } catch (e) {
    alert((e && e.message) || "Action failed — check PATCH /api/products/:id on backend");
  }
}

document.getElementById("deleteApprovedBtn").addEventListener("click", async () => {
  if (!confirm("Delete ALL approved products from the server?")) return;
  try {
    const products = await fetchProductsMerged();
    const approved = products.filter(
      (p) => (p.status || "").toLowerCase() === "approved"
    );
    for (const p of approved) {
      await deleteProduct(p.id);
    }
    alert("Removed " + approved.length + " approved listing(s).");
    await loadPendingProducts();
  } catch (e) {
    alert((e && e.message) || "Delete failed");
  }
});

loadPendingProducts();
</script>

<script src="script/bootstrap.min.js"></script>
<script src="index.js"></script>
</body>
