<body class="thriftit-product-page">

</div>


  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">

<a class="navbar-brand d-flex align-items-center py-2" href="index.html">
  <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">

    </button>

        <form class="navbar-search-form" role="search" onsubmit="goToSearch(event)">

<main class="product-main">
  <div class="product-shell">
  <div class="product-layout">
    <div class="product-gallery">
      <div id="productCarousel" class="carousel slide product-gallery-carousel">
        <div class="carousel-inner" id="carousel-inner"></div>
      </div>
    </div>

    <div class="product-panel">
      <h1 class="product-panel__title" id="product-name">Loading…</h1>
      <p class="product-panel__brand d-none" id="product-brand"></p>
      <p class="product-panel__seller d-none" id="product-seller">
        <i class="fa-solid fa-store" aria-hidden="true"></i>
        Sold by <span id="detail-seller"></span>
        <span id="detail-seller-rating" class="product-panel__seller-rating d-none"></span>
      </p>

      <dl class="product-details">
        <div class="product-details__row">
          <dt>Category</dt>
          <dd id="detail-category">—</dd>
        </div>
        <div class="product-details__row">
          <dt>Gender</dt>
          <dd id="detail-gender">—</dd>
        </div>
        <div class="product-details__row product-details__row--description">
          <dt>Description</dt>
          <dd id="detail-description">—</dd>
        </div>
        <div class="product-details__row">
          <dt>Size</dt>
          <dd id="detail-size">—</dd>
        </div>
        <div class="product-details__row">
          <dt>Color</dt>
          <dd id="detail-color">—</dd>
        </div>
        <div class="product-details__row">
          <dt>Condition</dt>
          <dd id="detail-condition">—</dd>
        </div>
        <div class="product-details__row">
          <dt>Material</dt>
          <dd id="detail-material">—</dd>
        </div>
        <div class="product-details__row product-details__row--price">
          <dt>Price</dt>
          <dd id="detail-price">—</dd>
        </div>
      </dl>

      <div id="product-own-banner" class="product-own-banner d-none" role="status">
        <i class="fa-solid fa-circle-user" aria-hidden="true"></i>
        <span>This is your product — you cannot buy or wishlist your own listing.</span>
      </div>

      <div class="product-actions" id="product-buy-actions">
        <button type="button" id="add-to-cart" class="btn product-actions__primary">
          <i class="fa-solid fa-cart-shopping me-2" aria-hidden="true"></i>Add to cart
        </button>
        <button type="button" id="buy-it-now" class="btn product-actions__primary">
          Buy it now
        </button>
        <button type="button" id="add-to-wishlist" class="btn product-actions__outline">
          <i class="fa-solid fa-heart me-2" aria-hidden="true"></i>Wishlist
        </button>
      </div>

      <div class="product-actions product-actions--own d-none" id="product-own-actions">
        <a id="edit-listing-link" href="seller.html" class="btn product-actions__primary text-decoration-none text-center">
          <i class="fa-solid fa-pen-to-square me-2" aria-hidden="true"></i>Edit listing
        </a>
      </div>

      <section id="product-seller-reviews" class="product-seller-reviews d-none" aria-labelledby="product-seller-reviews-title">
        <h2 id="product-seller-reviews-title" class="product-seller-reviews__title">Seller reviews</h2>
        <div id="product-seller-reviews-list" class="product-seller-reviews__list"></div>
        <button type="button" id="product-seller-reviews-toggle" class="product-seller-reviews__toggle d-none">
          View more reviews

</main>

<div id="product-image-lightbox" class="thriftit-image-lightbox d-none" aria-hidden="true">
  <button type="button" class="thriftit-image-lightbox__close" aria-label="Close enlarged photo">&times;</button>
  <button type="button" class="thriftit-image-lightbox__nav thriftit-image-lightbox__nav--prev" aria-label="Previous photo">
    <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
  </button>
  <img class="thriftit-image-lightbox__img" alt="" />
  <button type="button" class="thriftit-image-lightbox__nav thriftit-image-lightbox__nav--next" aria-label="Next photo">
    <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
  </button>
  <p class="thriftit-image-lightbox__count"></p>
</div>

<script src="script/bootstrap.min.js"></script>
<script>

var productImageLightbox = createThriftitImageLightbox("product-image-lightbox");

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');

let product = null;

(async function hydrateProduct() {
  try {
    if (productId && typeof fetchProductById === "function") {
      product = await fetchProductById(productId);
    }
    if (!product && typeof fetchProductsMerged === "function") {
      const products = await fetchProductsMerged();
      product = products.find((p) => String(p.id) === String(productId));
    }

    if (!product || !productId) {
      if (productId) showToast("Product not found");
      return;
    }

    function formatGender(g) {
      var s = String(g || "").toLowerCase().trim();
      if (s === "female") return "Women";
      if (s === "male") return "Men";
      if (g === "Female") return "Women";
      if (g === "Male") return "Men";
      return g && String(g).trim() ? String(g).trim() : "—";
    }

    function formatCategory(p) {
      var raw =
        (p.subcategory && String(p.subcategory).trim()) ||
        (p.categoryDisplay && String(p.categoryDisplay).trim()) ||
        (p.category && String(p.category).trim()) ||
        "";
      if (!raw) return "—";
      return raw
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, function (c) {
          return c.toUpperCase();
        });
    }

    function setDetail(id, value) {
      var el = document.getElementById(id);
      if (!el) return;
      var text =
        value != null && String(value).trim() !== "" ? String(value).trim() : "—";
      el.textContent = text;
    }

    document.getElementById("product-name").textContent =
      typeof productDisplayTitle === "function"
        ? productDisplayTitle(product)
        : (product.name && String(product.name).trim()) || "Untitled";

    var brandEl = document.getElementById("product-brand");
    if (product.brand && String(product.brand).trim()) {
      brandEl.textContent = product.brand;
      brandEl.classList.remove("d-none");
    } else {
      brandEl.classList.add("d-none");
    }

    var sellerEl = document.getElementById("product-seller");
    var sellerNameEl = document.getElementById("detail-seller");
    var sellerLabel =
      product.sellerName && String(product.sellerName).trim()
        ? String(product.sellerName).trim()
        : "";
    if (sellerLabel && sellerNameEl && sellerEl) {
      sellerNameEl.textContent = sellerLabel;
      sellerEl.classList.remove("d-none");
    } else if (sellerEl) {
      sellerEl.classList.add("d-none");
    }

    if (product.sellerId && typeof getSellerReviews === "function") {
      loadProductSellerReviews(product.sellerId);
    }

    setDetail("detail-category", formatCategory(product));
    setDetail("detail-gender", formatGender(product.gender));
    setDetail("detail-description", product.description || "—");
    setDetail("detail-size", product.size);
    setDetail("detail-color", product.color);
    setDetail(
      "detail-condition",
      product.condition
        ? String(product.condition).charAt(0).toUpperCase() +
            String(product.condition).slice(1).toLowerCase()
        : "—"
    );
    setDetail("detail-material", product.material);
    setDetail(
      "detail-price",
      product.price != null && product.price !== ""
        ? product.price + " EGP"
        : "—"
    );

    document.title =
      (typeof productDisplayTitle === "function"
        ? productDisplayTitle(product)
        : (product.name && String(product.name).trim()) || "Product") +
      " — Thrift It";

    function resolveGallerySrc(img) {
      if (typeof resolveProductImageUrl === "function") {
        return resolveProductImageUrl(img);
      }
      return typeof img === "string" ? img.trim() : "";
    }

    var galleryUrls = (product.images || [])
      .map(resolveGallerySrc)
      .filter(function (u) {
        return u && String(u).trim();
      });
    if (typeof uniqueImageUrls === "function") {
      galleryUrls = uniqueImageUrls(galleryUrls);
    } else {
      var seenGallery = {};
      galleryUrls = galleryUrls.filter(function (u) {
        if (seenGallery[u]) return false;
        seenGallery[u] = true;
        return true;
      });
    }
    if (!galleryUrls.length && typeof thriftitGalleryPlaceholder === "function") {
      galleryUrls = [thriftitGalleryPlaceholder()];
    }

    var carouselEl = document.getElementById("productCarousel");
    if (carouselEl) {
      var navHtml =
        typeof galleryNavControlsHtml === "function"
          ? galleryNavControlsHtml(galleryUrls.length > 1)
          : "";
      var inner = carouselEl.querySelector(".carousel-inner");
      if (inner) inner.innerHTML = "";
      carouselEl.insertAdjacentHTML("beforeend", navHtml);
      if (typeof mountThriftitGallery === "function") {
        mountThriftitGallery(
          carouselEl,
          galleryUrls,
          "d-block w-100 product-gallery__img",
          productImageLightbox ? productImageLightbox.open : null
        );
      }
    }

    var galleryEl = document.querySelector(".product-gallery");
    if (galleryEl) galleryEl.classList.add("product-gallery--has-image");

    var isOwn =
      typeof isOwnProduct === "function" && isOwnProduct(product);
    var ownBanner = document.getElementById("product-own-banner");
    var buyActions = document.getElementById("product-buy-actions");
    var ownActions = document.getElementById("product-own-actions");
    var editLink = document.getElementById("edit-listing-link");

    if (isOwn) {
      if (ownBanner) ownBanner.classList.remove("d-none");
      if (buyActions) buyActions.classList.add("d-none");
      if (ownActions) ownActions.classList.remove("d-none");
      if (editLink && product.id) {
        editLink.href =
          "seller.html?edit=" + encodeURIComponent(String(product.id));
      }
      if (sellerNameEl) sellerNameEl.textContent = "You";
      if (sellerEl) sellerEl.classList.remove("d-none");
    }

    var isSold = String(product.status || "").toLowerCase() === "sold";
    var addBtn = document.getElementById("add-to-cart");
    var buyBtn = document.getElementById("buy-it-now");
    var wishBtn = document.getElementById("add-to-wishlist");
    if (isOwn) {
      /* purchase actions hidden above */
    } else if (isSold) {
      if (addBtn) {
        addBtn.disabled = true;
        addBtn.innerHTML =
          '<i class="fa-solid fa-tag me-2" aria-hidden="true"></i>Sold';
      }
      if (buyBtn) buyBtn.disabled = true;
      if (wishBtn) {
        wishBtn.disabled = true;
        wishBtn.innerHTML =
          '<i class="fa-solid fa-heart me-2" aria-hidden="true"></i>Sold';
      }
    } else {
      if (addBtn) addBtn.disabled = false;
      if (buyBtn) buyBtn.disabled = false;
      if (wishBtn) {
        wishBtn.disabled = false;
        wishBtn.innerHTML =
          '<i class="fa-solid fa-heart me-2" aria-hidden="true"></i>Wishlist';
      }
    }
  } catch (err) {
    console.error(err);
    if (productId) showToast(thriftitUserMessage(err, "Something went wrong. Please try again."));
  }
})();

function productReviewStarsHtml(rating) {
  var raw = Number(rating);
  if (!Number.isFinite(raw) || raw < 1) {
    return '<span class="profile-review-card__meta">No rating</span>';
  }
  var n = Math.max(1, Math.min(5, Math.round(raw)));
  var s = "";
  var i;
  for (i = 0; i < n; i++) {
    s += '<i class="fa-solid fa-star" aria-hidden="true"></i>';
  }
  for (i = n; i < 5; i++) {
    s += '<i class="fa-solid fa-star profile-star--empty" aria-hidden="true"></i>';
  }
  return (
    '<div class="profile-review-card__stars">' +
    s +
    ' <span class="profile-review-card__meta">(' +
    n +
    "/5)</span></div>"
  );
}

function formatProductReviewDate(at) {
  if (!at) return "";
  var d = new Date(at);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleDateString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
  });
}

var PRODUCT_REVIEWS_INITIAL = 2;

function buildProductSellerReviewCard(r) {
  var card = document.createElement("article");
  card.className = "profile-review-card";

  var productLine = r.productName
    ? '<p class="profile-review-card__product">' +
      escapeHtml(r.productName) +
      "</p>"
    : "";

  var buyerLine =
    '<p class="profile-review-card__meta">Buyer · ' +
    escapeHtml(r.buyerLabel || "Buyer") +
    "</p>";

  var dateLine = formatProductReviewDate(r.createdAt);
  var dateHtml = dateLine
    ? '<p class="profile-review-card__date">' + escapeHtml(dateLine) + "</p>"
    : "";

  var textHtml =
    r.text && String(r.text).trim()
      ? '<p class="profile-review-card__text">' + escapeHtml(r.text) + "</p>"
      : "";

  card.innerHTML =
    productLine +
    buyerLine +
    productReviewStarsHtml(r.rating) +
    textHtml +
    dateHtml;
  return card;
}

async function loadProductSellerReviews(sellerId) {
  var section = document.getElementById("product-seller-reviews");
  var listEl = document.getElementById("product-seller-reviews-list");
  var toggleBtn = document.getElementById("product-seller-reviews-toggle");
  var ratingEl = document.getElementById("detail-seller-rating");
  if (!section || !listEl) return;

  try {
    var ratingPromise =
      typeof getSellerRating === "function"
        ? getSellerRating(sellerId)
        : Promise.resolve({ averageRating: 0, totalReviews: 0 });
    var reviewsPromise = getSellerReviews(sellerId);
    var rating = await ratingPromise;
    var reviews = await reviewsPromise;

    var total =
      rating && rating.totalReviews > 0
        ? rating.totalReviews
        : reviews.length;

    if (ratingEl && total > 0 && rating.averageRating > 0) {
      var avg =
        Math.round(Number(rating.averageRating) * 10) / 10;
      ratingEl.innerHTML =
        ' · <i class="fa-solid fa-star" aria-hidden="true"></i> ' +
        escapeHtml(String(avg)) +
        " (" +
        escapeHtml(String(total)) +
        (total === 1 ? " review" : " reviews") +
        ")";
      ratingEl.classList.remove("d-none");
    }

    if (!reviews.length) return;

    section.classList.remove("d-none");
    listEl.innerHTML = "";
    listEl.classList.remove("is-expanded");
    if (toggleBtn) {
      toggleBtn.classList.add("d-none");
      toggleBtn.replaceWith(toggleBtn.cloneNode(true));
    }
    toggleBtn = document.getElementById("product-seller-reviews-toggle");

    var initialCount = Math.min(PRODUCT_REVIEWS_INITIAL, reviews.length);

    reviews.forEach(function (r, index) {
      var card = buildProductSellerReviewCard(r);
      if (index >= initialCount) {
        card.classList.add("product-seller-reviews__card--extra");
      }
      listEl.appendChild(card);
    });

    if (reviews.length > initialCount && toggleBtn) {
      var hiddenCount = reviews.length - initialCount;
      toggleBtn.classList.remove("d-none");
      toggleBtn.textContent =
        "View " +
        hiddenCount +
        " more review" +
        (hiddenCount === 1 ? "" : "s");

      toggleBtn.addEventListener("click", function () {
        var expanded = listEl.classList.toggle("is-expanded");
        toggleBtn.textContent = expanded
          ? "Show fewer reviews"
          : "View " +
            hiddenCount +
            " more review" +
            (hiddenCount === 1 ? "" : "s");
        toggleBtn.setAttribute(
          "aria-expanded",
          expanded ? "true" : "false"
        );
      });
      toggleBtn.setAttribute("aria-expanded", "false");
    }
  } catch (err) {
    console.error("Seller reviews:", err);
  }
}

async function addToWishlist(p) {
  if (!p || !productId) {
    showToast("Please wait — product is loading");
    return;
  }
  if (typeof isOwnProduct === "function" && isOwnProduct(p)) {
    showToast("This is your product");
    return;
  }
  if (!isLoggedIn()) {
    showToast("Please log in first");
    return;
  }
  try {
    await addProductToWishlist(p);
    showToast("Saved to wishlist");
  } catch (err) {
    console.error(err);
    var msg = thriftitUserMessage(err, "Something went wrong. Please try again.");
    if (/already in wishlist/i.test(msg)) {
      msg = "Already in your wishlist";
    }
    showToast(msg);
  }
}

async function addToCart(p, options) {
  options = options || {};
  if (!p || !productId) {
    showToast("Please wait — product is loading");
    return false;
  }
  if (typeof isOwnProduct === "function" && isOwnProduct(p)) {
    showToast("This is your product");
    return false;
  }

  if (!isLoggedIn()) {
    showToast("Please log in first");
    return false;
  }

  try {
    await addProductToCart(p);
    if (options.silent !== true) {
      showToast("Added to cart");
    }
    return true;
  } catch (err) {
    console.error(err);
    showToast(thriftitUserMessage(err, "Something went wrong. Please try again."));
    return false;
  }
}

const addBtn = document.getElementById('add-to-cart');
const buyBtn = document.getElementById('buy-it-now');
const wishlistBtn = document.getElementById('add-to-wishlist');

wishlistBtn?.addEventListener('click', () => {
  addToWishlist(product);
});

addBtn?.addEventListener("click", function () {
  addToCart(product);
});

if (buyBtn) {
  buyBtn.addEventListener("click", async function () {
    if (!product || !productId) {
      showToast("Please wait — product is loading");
      return;
    }
    if (typeof isOwnProduct === "function" && isOwnProduct(product)) {
      showToast("This is your product");
      return;
    }
    if (String(product.status || "").toLowerCase() === "sold") {
      showToast("This item is sold");
      return;
    }
    if (!isLoggedIn()) {
      showToast("Please log in first");
      window.location.href = "login.html";
      return;
    }
    buyBtn.disabled = true;
    try {
      var ok = await addToCart(product, { silent: true });
      if (ok) {
        window.location.href = "checkout.html";
      }
    } finally {
      if (String(product.status || "").toLowerCase() !== "sold") {
        buyBtn.disabled = false;
      }
    }
  });
}
</script>
<script src="index.js"></script>
  <script src="footer.js"></script>
