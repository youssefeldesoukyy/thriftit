<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Thrift It</title>
  <link rel="stylesheet" href="style/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="config.js?v=4000"></script>
  <script src="auth-api.js?v=3"></script>
</head>
<body class="thriftit-auth-page">

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center py-2" href="index.html">
        <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="women.html">Women</a></li>
          <li class="nav-item"><a class="nav-link" href="men.html">Men</a></li>
          <li class="nav-item">
            <a class="nav-link navbar-sell-nav" href="seller.html">Sell your item</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <form class="navbar-search-form" role="search" onsubmit="goToSearch(event)">
            <input class="navbar-search-input" type="search" placeholder="Search" id="searchInput" autocomplete="off">
            <button type="submit" class="navbar-search-btn" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </form>
          <a href="wishlist.html" class="wishlist-link" aria-label="Wishlist" title="Wishlist">
            <i class="fa-solid fa-heart"></i>
          </a>
          <a href="cart.html" class="cart-link">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
          <a href="login.html" id="loginBtn" class="btn btn-outline-dark btn-sm">Login</a>
          <a href="signup.html" id="signupBtn" class="btn btn-outline-dark btn-sm">Sign Up</a>
          <a href="profile.html" id="username" class="sign-link text-decoration-none align-middle" style="display:none;"></a>
        </div>
      </div>
    </div>
  </nav>

  <div class="auth-split">
    <aside class="auth-split__hero" aria-hidden="true">
      <div class="auth-split__hero-inner">
        <h2 class="auth-split__hero-title">Why Thrift It</h2>
        <div class="auth-split__hero-line"></div>
        <ul class="auth-split__benefits">
          <li>
            <span class="auth-split__check"><i class="fa-solid fa-check"></i></span>
            Unique vintage &amp; second-hand finds
          </li>
          <li>
            <span class="auth-split__check"><i class="fa-solid fa-check"></i></span>
            Buy and sell in one place — no hassle
          </li>
          <li>
            <span class="auth-split__check"><i class="fa-solid fa-check"></i></span>
            Give clothes a second life
          </li>
        </ul>
      </div>
    </aside>

    <section class="auth-split__form-panel">
      <div class="auth-split__form-wrap">
        <h1 class="auth-split__heading">Log in</h1>
        <p class="auth-split__sub">Welcome back — pick up where you left off.</p>

        <form id="loginForm">
          <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email" autocomplete="email" required>
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
          </div>
          <p class="auth-form-switch mb-3">
            <a href="forgot-password.html" class="auth-switch-link">Forgot password?</a>
          </p>
          <button type="submit" class="btn auth-submit">Log in</button>
          <p class="auth-form-switch">
            Don't have an account?
            <a href="signup.html" class="auth-switch-link">Sign up</a>
          </p>
        </form>
      </div>
    </section>
  </div>
<script src="footer.js"></script>
  <script src="script/bootstrap.min.js"></script>
  <script src="index.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      var email = document.getElementById("email").value.trim().toLowerCase();
      var password = document.getElementById("password").value.trim();
      if (!email || !password) {
        showToast("Please fill all fields");
        return;
      }
      try {
        await apiLogin(email, password);
        showToast("Login successful");
        setTimeout(function () { window.location.href = "index.html"; }, 350);
      } catch (err) {
        showToast((err && err.message) || "Invalid email or password");
      }
    });
  </script>
  </body>
</html>
