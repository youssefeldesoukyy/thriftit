<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Thrift It</title>
  <link rel="stylesheet" href="style/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="auth-api.js?v=6"></script>
  <script src="products-api.js?v=8"></script>
</head>
<body class="thriftit-shop-page">
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center py-2" href="index.html">
        <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="women.html">Women</a></li>
          <li class="nav-item"><a class="nav-link" href="men.html">Men</a></li>
          <li class="nav-item"><a class="nav-link navbar-sell-nav" href="seller.html">Sell your item</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <form class="navbar-search-form" role="search" onsubmit="goToSearch(event)">
            <input class="navbar-search-input" type="search" placeholder="Search" id="searchInput" autocomplete="off">
            <button type="submit" class="navbar-search-btn" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </form>
          <a href="wishlist.html" class="wishlist-link" aria-label="Wishlist" title="Wishlist">
            <i class="fa-solid fa-heart"></i>
          </a>
          <a href="cart.html" class="cart-link" aria-label="Cart" title="Cart">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
          <a href="login.html" id="loginBtn" class="btn btn-outline-dark btn-sm">Login</a>
          <a href="signup.html" id="signupBtn" class="btn btn-outline-dark btn-sm">Sign Up</a>
          <a href="profile.html" id="username" class="sign-link text-decoration-none align-middle" style="display:none;"></a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container shop-page thriftit-page-section mt-5 pt-5 pb-5">
    <h1 class="thriftit-page-heading" id="searchPageTitle">Search</h1>
    <div class="row g-4" id="results"></div>
  </div>

  <script src="script/bootstrap.min.js"></script>
  <script src="index.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var queryRaw = params.get("query") || "";
      var query = queryRaw.toLowerCase().trim();
      var input = document.getElementById("searchInput");
      if (input && queryRaw) input.value = queryRaw;
      var titleEl = document.getElementById("searchPageTitle");
      if (titleEl) {
        titleEl.textContent = queryRaw ? "Search: " + queryRaw : "Search";
      }
      renderShopProductGrid("results", {
        carouselPrefix: "search",
        searchQuery: query,
        emptyMessage: query ? "No results found" : "Start searching",
        emptyHint: query
          ? 'Try different keywords or <a href="shopall.html" class="text-white">browse all</a>.'
          : "Use the search bar above to find items by name or category.",
      });
    })();
  </script>
  <script src="footer.js"></script>
</body>
</html>
