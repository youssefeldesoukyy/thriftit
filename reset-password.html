<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password — Thrift It</title>
  <link rel="stylesheet" href="style/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="config.js?v=4000"></script>
  <script src="auth-api.js?v=6"></script>
</head>
<body class="thriftit-auth-page">
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg fixed-top navbar-light thriftit-navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center py-2" href="index.html">
        <img src="images/thriftit-logo.png" alt="Thrift It" class="thriftit-navbar-logo">
      </a>
    </div>
  </nav>

  <div class="auth-split">
    <aside class="auth-split__hero" aria-hidden="true">
      <div class="auth-split__hero-inner">
        <h2 class="auth-split__hero-title">New password</h2>
        <div class="auth-split__hero-line"></div>
        <p style="opacity:0.9;margin:0;">Choose a strong password you have not used here before.</p>
      </div>
    </aside>

    <section class="auth-split__form-panel">
      <div class="auth-split__form-wrap">
        <h1 class="auth-split__heading">Set new password</h1>
        <p class="auth-split__sub" id="reset-hint">Enter your new password below.</p>

        <form id="resetForm" novalidate>
          <div class="auth-field">
            <label for="password">New password</label>
            <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required>
          </div>
          <div class="auth-field">
            <label for="passwordConfirm">Confirm password</label>
            <input type="password" id="passwordConfirm" placeholder="Repeat password" autocomplete="new-password" minlength="6" required>
          </div>
          <button type="submit" class="btn auth-submit" id="submitBtn">Update password</button>
          <p class="auth-form-switch mt-3">
            <a href="login.html" class="auth-switch-link">Back to log in</a>
          </p>
        </form>
      </div>
    </section>
  </div>

  <script src="footer.js"></script>
  <script src="script/bootstrap.min.js"></script>
  <script>
    function getTokenFromUrl() {
      try {
        return new URLSearchParams(window.location.search).get("token") || "";
      } catch (_) {
        return "";
      }
    }

    var resetToken = getTokenFromUrl();
    if (!resetToken) {
      document.getElementById("reset-hint").innerText =
        "This reset link is missing or invalid. Request a new one from the forgot password page.";
      document.getElementById("submitBtn").disabled = true;
    }

    document.getElementById("resetForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      if (!resetToken) {
        showToast("Invalid reset link");
        return;
      }
      var password = document.getElementById("password").value;
      var confirm = document.getElementById("passwordConfirm").value;
      if (password.length < 6) {
        showToast("Password must be at least 6 characters");
        return;
      }
      if (password !== confirm) {
        showToast("Passwords do not match");
        return;
      }
      var btn = document.getElementById("submitBtn");
      btn.disabled = true;
      try {
        var msg = await apiResetPassword(resetToken, password);
        showToast(msg);
        setTimeout(function () {
          window.location.href = "login.html";
        }, 1200);
      } catch (err) {
        showToast((err && err.message) || "Could not reset password");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
